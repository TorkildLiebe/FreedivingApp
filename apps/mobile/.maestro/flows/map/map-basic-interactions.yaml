appId: com.anonymous.mobile
name: Map Basic Interactions
tags:
  - map
---
# Tests core map screen interactions: search, layer toggle, center-on-me.
# Does not require backend — only tests UI element responsiveness.

- stopApp

- launchApp:
    clearState: false

# Dismiss any OS permission dialogs
- runFlow:
    when:
      visible: "Allow While Using App"
    commands:
      - tapOn: "Allow While Using App"

- extendedWaitUntil:
    visible:
      id: "map-search-input"
    timeout: 15000

# Test search input: tap, type, verify, clear
- tapOn:
    id: "map-search-input"

- inputText: "Test spot"

- assertVisible: "Test spot"

# Clear the search input
- eraseText

# Test layer toggle button is tappable
- tapOn:
    id: "map-toggle-layer-button"

# Map should still be functional after layer toggle
- assertVisible:
    id: "map-search-input"

# Test center on me button
- tapOn:
    id: "map-center-on-me-button"

# All floating buttons should remain visible
- assertVisible:
    id: "map-toggle-layer-button"

- assertVisible:
    id: "map-start-create-spot-button"
