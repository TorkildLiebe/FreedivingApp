appId: com.anonymous.mobile
name: Auth Login Screen
tags:
  - auth
---
- stopApp

- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        id: "auth-screen-title"
    commands:
      - assertVisible: "Sign in to continue"
      - assertVisible:
          id: "auth-google-button"
      - assertVisible:
          id: "auth-email-input"
      - assertVisible:
          id: "auth-password-input"
      - assertVisible:
          id: "auth-submit-button"

      - tapOn:
          id: "auth-email-input"
      - inputText: "test@example.com"
      - tapOn:
          id: "auth-password-input"
      - inputText: "password123"

      - tapOn:
          id: "auth-toggle-mode-button"
      - assertVisible: "Create an account"
      - assertVisible:
          id: "auth-signup-alias-input"

      - tapOn:
          id: "auth-toggle-mode-button"
      - assertVisible: "Sign in to continue"
