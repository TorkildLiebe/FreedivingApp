appId: com.anonymous.mobile
name: Profile Shell
tags:
  - auth
  - profile
---
- stopApp

- launchApp:
    clearState: false

- openLink: "mobile://profile"

- runFlow:
    when:
      visible: "Allow While Using App"
    commands:
      - tapOn: "Allow While Using App"

- runFlow:
    when:
      visible: "Open in “mobile”?"
    commands:
      - tapOn: "Open"

- extendedWaitUntil:
    visible:
      id: "profile-screen-root"
    timeout: 10000

- assertVisible:
    id: "profile-header-alias"

- assertVisible:
    id: "profile-row-reports"

- assertVisible:
    id: "profile-row-logout"

- tapOn:
    id: "profile-row-reports"

- assertVisible:
    id: "profile-view-title"

- tapOn:
    id: "profile-back-button"

- assertVisible:
    id: "profile-row-reports"
